name: install

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      resource_repo:
        description: "External resource repo (owner/repo), leave empty to disable"
        required: false
        default: "quartawa/mah_res"
      resource_ref:
        description: "External resource branch or tag"
        required: false
        default: "main"
      resource_path:
        description: "Path inside external repo to sync to assets/resource"
        required: false
        default: "assets/resource"

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [win, macos, linux, android]
        arch: [aarch64, x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Sync external resource repository (full package)
        id: sync_resource
        shell: bash
        env:
          INPUT_RESOURCE_REPO: ${{ github.event.inputs.resource_repo }}
          INPUT_RESOURCE_REF: ${{ github.event.inputs.resource_ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "resource_version=" >> "$GITHUB_OUTPUT"
          DEFAULT_RESOURCE_REPO="quartawa/mah_res"

          RESOURCE_REPO="$INPUT_RESOURCE_REPO"
          if [[ -z "$RESOURCE_REPO" ]]; then
            RESOURCE_REPO="$DEFAULT_RESOURCE_REPO"
          fi

          echo "Downloading full resources from $RESOURCE_REPO"
          mkdir -p assets/resource

          RESOURCE_REF="$INPUT_RESOURCE_REF"
          if [[ -z "$RESOURCE_REF" || "$RESOURCE_REF" == "main" ]]; then
            RELEASE_API="https://api.github.com/repos/$RESOURCE_REPO/releases/latest"
            echo "Using latest release from $RESOURCE_REPO"
          else
            RELEASE_API="https://api.github.com/repos/$RESOURCE_REPO/releases/tags/$RESOURCE_REF"
            echo "Using specified release tag '$RESOURCE_REF' from $RESOURCE_REPO"
          fi

          RELEASE_JSON=$(curl -fsSL -H "Authorization: token $GITHUB_TOKEN" "$RELEASE_API" || true)
          if [[ -z "$RELEASE_JSON" ]]; then
            echo "[WARNING] Failed to fetch release metadata from $RELEASE_API, keep local assets unchanged"
            exit 0
          fi

          RESOURCE_VERSION_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name // empty')
          if [[ -n "$RESOURCE_VERSION_TAG" ]]; then
            echo "resource_version=$RESOURCE_VERSION_TAG" >> "$GITHUB_OUTPUT"
          fi

          # 仅查找 full 包，不使用 hotfix/incremental/patch
          PACKAGE_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("full")) | .browser_download_url' | head -1)

          if [[ -z "$PACKAGE_URL" ]]; then
            # 最后兜底：任意 zip/tar.gz，且排除 hotfix/incremental/patch
            PACKAGE_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".zip") or endswith(".tar.gz")) | select((.name | contains("hotfix") or contains("incremental") or contains("patch")) | not) | .browser_download_url' | head -1)
          fi

          if [[ -z "$PACKAGE_URL" ]]; then
            echo "[WARNING] No resource package found in releases, keep local assets unchanged"
            exit 0
          fi

          echo "Downloading from: $PACKAGE_URL"
          TEMP_PACKAGE="/tmp/mah_res_package.$(echo $PACKAGE_URL | grep -oE '\.[^.]+$' | tr -d '.')"
          curl -L -H "Authorization: token $GITHUB_TOKEN" -o "$TEMP_PACKAGE" "$PACKAGE_URL"

          if [[ ! -f "$TEMP_PACKAGE" ]]; then
            echo "[ERROR] Failed to download resource package"
            exit 1
          fi

          # 解压到 assets/resource（不删除本地已有文件，只增量更新）
          if [[ "$TEMP_PACKAGE" == *.zip ]]; then
            unzip -o -q "$TEMP_PACKAGE" -d "assets/resource/"
          elif [[ "$TEMP_PACKAGE" == *.tar.gz ]]; then
            tar -xzf "$TEMP_PACKAGE" -C "assets/resource/"
          fi

          # 兼容旧资源包结构：统一归并到 assets/resource/base
          # image 应位于 base/image（不能打散到 base 根目录）
          if [[ -d "assets/resource/image" ]]; then
            mkdir -p assets/resource/base/image
            rsync -a "assets/resource/image/" "assets/resource/base/image/"
            rm -rf "assets/resource/image"
          fi

          # 旧包可能将 model/pipeline 放在 resource 根目录，归并到 base 下
          if [[ -d "assets/resource/model" ]]; then
            mkdir -p assets/resource/base/model
            rsync -a "assets/resource/model/" "assets/resource/base/model/"
            rm -rf "assets/resource/model"
          fi

          if [[ -d "assets/resource/pipeline" ]]; then
            mkdir -p assets/resource/base/pipeline
            rsync -a "assets/resource/pipeline/" "assets/resource/base/pipeline/"
            rm -rf "assets/resource/pipeline"
          fi

          rm -f "$TEMP_PACKAGE"
          echo "Resources synced successfully (full package mode)"

      - name: Download MAH-UI (new naming)
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        continue-on-error: true
        with:
          repository: Quartewe/MAH-UI
          fileName: "MAHUI-${{ matrix.os }}-${{ matrix.arch }}-*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Download MAH-UI (legacy fallback)
        if: matrix.os != 'android' && steps.download_mfa.outcome == 'failure'
        id: download_mfa_legacy
        uses: robinraju/release-downloader@v1
        with:
          repository: Quartewe/MAH-UI
          fileName: "MFW-PyQt6-${{ matrix.os }}-${{ matrix.arch }}-*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MAH-UI archive
        if: matrix.os != 'android'
        shell: bash
        run: |
          DOWNLOAD_FILES='${{ steps.download_mfa.outputs.downloaded_files }}'
          if [[ -z "$DOWNLOAD_FILES" || "$DOWNLOAD_FILES" == '[]' ]]; then
            DOWNLOAD_FILES='${{ steps.download_mfa_legacy.outputs.downloaded_files }}'
          fi
          ARCHIVE_FILE_PATH="$(echo "$DOWNLOAD_FILES" | jq -r '.[0]')"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MAH-UI."

      - name: Remove built-in runtime in MFA
        if: matrix.os != 'android'
        shell: bash
        run: |
          rm -rf MFA/runtimes
      
      - name: Install
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" != "android" ]]; then
            if [ -d "MFA" ]; then
              echo "Copying MFA files to install directory..."
              mkdir -p install
              rsync -av --ignore-existing MFA/ install/
              echo "MFA files copied successfully."
            else
              echo "MFA directory not found, skipping copy."
            fi
          else
            echo "Skipping copy MFA for Android."
          fi

          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }} "${{ steps.sync_resource.outputs.resource_version }}"
          cd ..

          if [[ -f "config/maa_option.json" ]]; then
            mkdir -p install/config
            cp -f "config/maa_option.json" "install/config/maa_option.json"
            echo "Copied config/maa_option.json to install/config"
          else
            echo "[WARNING] config/maa_option.json not found in source repo"
          fi

      - name: Inject embedded python launcher for Windows agent
        if: matrix.os == 'win' && matrix.arch == 'x86_64'
        shell: bash
        run: |
          set -euo pipefail

          internal_dir="install/_internal"
          mkdir -p "$internal_dir"

          if [[ -f "$internal_dir/python.exe" ]]; then
            echo "Embedded python launcher already exists, skip download"
            exit 0
          fi

          py_dll=$(ls "$internal_dir"/python*.dll 2>/dev/null | head -n1 || true)
          if [[ -z "$py_dll" ]]; then
            echo "[ERROR] cannot detect python runtime version from $internal_dir/python*.dll"
            exit 1
          fi

          py_tag=$(basename "$py_dll" | sed -E 's/^python([0-9]+)\.dll$/\1/')
          if [[ ! "$py_tag" =~ ^[0-9]{3}$ ]]; then
            echo "[ERROR] unsupported python dll name: $(basename "$py_dll")"
            exit 1
          fi

          py_major=${py_tag:0:1}
          py_minor=${py_tag:1:2}
          py_ver="${py_major}.${py_minor}.0"

          embed_zip="python-${py_ver}-embed-amd64.zip"
          embed_url="https://www.python.org/ftp/python/${py_ver}/${embed_zip}"

          echo "Downloading embedded launcher from: $embed_url"
          curl -fL "$embed_url" -o "/tmp/${embed_zip}"

          unzip -j -o "/tmp/${embed_zip}" "python.exe" "pythonw.exe" -d "$internal_dir"
          rm -f "/tmp/${embed_zip}"

          test -f "$internal_dir/python.exe"
          echo "Embedded python launcher injected: $internal_dir/python.exe"

      - name: Include docs in package root
        shell: bash
        run: |
          if [[ -d "docs" ]]; then
            mkdir -p install/docs
            rsync -av docs/ install/docs/
            echo "Docs copied to install/docs"
          else
            echo "[WARNING] docs directory not found, skipping"
          fi

      - name: Validate packaged files
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.os }}" == "android" ]]; then
            echo "Skip desktop package validation for android"
            exit 0
          fi

          toolkit_file=""
          case "${{ matrix.os }}" in
            win)
              toolkit_file="install/MaaToolkit.dll"
              ;;
            linux)
              toolkit_file="install/libMaaToolkit.so"
              ;;
            macos)
              toolkit_file="install/libMaaToolkit.dylib"
              ;;
            *)
              echo "[ERROR] unknown desktop os: ${{ matrix.os }}"
              exit 1
              ;;
          esac

          required_files=(
            "install/interface.json"
            "install/icon.png"
            "install/config/maa_option.json"
            "$toolkit_file"
          )

          if [[ "${{ matrix.os }}" == "win" ]]; then
            required_files+=("install/_internal/python.exe")
          fi

          missing=0
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "[ERROR] missing required file: $file"
              missing=1
            fi
          done

          if [[ $missing -ne 0 ]]; then
            echo "[ERROR] package validation failed"
            exit 1
          fi

          echo "Package validation passed"

      - uses: actions/upload-artifact@v4
        with:
          name: MAH-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"
          retention-days: 1

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          # 正式版：使用 tag-pattern 只匹配正式版标签，包含所有从上一个正式版以来的提交
          # 预发布版：正常生成，只包含从上一个标签以来的提交
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd "$f" && zip -r "../$f-${{ needs.meta.outputs.tag }}.zip" .)

            # 生成增量包：不包含从 mah_res 合并的资源目录
            inc_dir="${f}-incremental"
            rm -rf "$inc_dir"
            mkdir -p "$inc_dir"
            rsync -a "$f/" "$inc_dir/"

            # 保护 mah_res 相关目录，不进入增量包
            rm -rf "$inc_dir/resource/index"
            rm -rf "$inc_dir/resource/base/image/ar"
            rm -rf "$inc_dir/resource/base/image/character"

            (cd "$inc_dir" && zip -r "../$f-incremental-${{ needs.meta.outputs.tag }}.zip" .)
            rm -rf "$inc_dir"
          done
          
      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

        # Mirror酱为第三方分发服务，新项目默认关闭
        # 若有需要请联系 Mirror酱 开通，直接自行开启是无法使用的
        # https://mirrorchyan.com/
      - name: Trigger MirrorChyanUploading
        if: false
        # if: ${{ github.repository_owner == 'MaaXYZ' }}
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
