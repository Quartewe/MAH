name: install

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      resource_repo:
        description: "External resource repo (owner/repo), leave empty to disable"
        required: false
        default: "quartawa/mah_res"
      resource_ref:
        description: "External resource branch or tag"
        required: false
        default: "main"
      resource_path:
        description: "Path inside external repo to sync to assets/resource"
        required: false
        default: "assets/resource"

jobs:
  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          # 检查标签格式
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi

          if ! $($is_release) ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          # 检查是否为预发布版本
          is_prerelease=false
          if [[ $tag =~ .*alpha.* || $tag =~ .*beta.* || $tag =~ .*rc.* || $tag =~ .*dev.* || $tag =~ .*-ci.* ]]; then
            is_prerelease=true
            echo "This is a pre-release version"
          fi

          echo tag=$tag | tee -a $GITHUB_OUTPUT
          echo is_release=$is_release | tee -a $GITHUB_OUTPUT
          echo is_prerelease=$is_prerelease | tee -a $GITHUB_OUTPUT
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}
      is_prerelease: ${{ steps.set_tag.outputs.is_prerelease }}

  install:
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [win, macos, linux, android]
        arch: [aarch64, x86_64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          fileName: "MAA-${{ matrix.os }}-${{ matrix.arch }}*"
          latest: true
          out-file-path: "deps"
          extract: true

      - name: Sync external resource repository (incremental)
        shell: bash
        env:
          INPUT_RESOURCE_REPO: ${{ github.event.inputs.resource_repo }}
          INPUT_RESOURCE_REF: ${{ github.event.inputs.resource_ref }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DEFAULT_RESOURCE_REPO="quartawa/mah_res"

          RESOURCE_REPO="$INPUT_RESOURCE_REPO"
          if [[ -z "$RESOURCE_REPO" ]]; then
            RESOURCE_REPO="$DEFAULT_RESOURCE_REPO"
          fi

          echo "Downloading incremental resources from $RESOURCE_REPO"
          mkdir -p assets/resource

          # 获取最新 release 信息
          RELEASES_API="https://api.github.com/repos/$RESOURCE_REPO/releases?per_page=10"
          RELEASE_JSON=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$RELEASES_API")

          # 优先查找 hotfix 包，如果没有则用 full 包
          HOTFIX_URL=$(echo "$RELEASE_JSON" | jq -r '.[] | .assets[] | select(.name | contains("hotfix") or contains("incremental") or contains("patch")) | .browser_download_url' | head -1)
          
          if [[ -n "$HOTFIX_URL" ]]; then
            echo "Found incremental package: $HOTFIX_URL"
            PACKAGE_URL="$HOTFIX_URL"
          else
            echo "No incremental package found, falling back to full package"
            PACKAGE_URL=$(echo "$RELEASE_JSON" | jq -r '.[] | .assets[] | select(.name | contains("full")) | .browser_download_url' | head -1)
          fi

          if [[ -z "$PACKAGE_URL" ]]; then
            # 最后兜底：任何 zip/tar.gz 都算 full 包
            PACKAGE_URL=$(echo "$RELEASE_JSON" | jq -r '.[] | .assets[] | select(.name | endswith(".zip") or endswith(".tar.gz")) | select(.name | contains("hotfix") | not) | .browser_download_url' | head -1)
          fi

          if [[ -z "$PACKAGE_URL" ]]; then
            echo "[WARNING] No resource package found in releases, keep local assets unchanged"
            exit 0
          fi

          echo "Downloading from: $PACKAGE_URL"
          TEMP_PACKAGE="/tmp/mah_res_package.$(echo $PACKAGE_URL | grep -oE '\.[^.]+$' | tr -d '.')"
          curl -L -H "Authorization: token $GITHUB_TOKEN" -o "$TEMP_PACKAGE" "$PACKAGE_URL"

          if [[ ! -f "$TEMP_PACKAGE" ]]; then
            echo "[ERROR] Failed to download resource package"
            exit 1
          fi

          # 解压到 assets/resource（不删除本地已有文件，只增量更新）
          if [[ "$TEMP_PACKAGE" == *.zip ]]; then
            unzip -o -q "$TEMP_PACKAGE" -d "assets/resource/"
          elif [[ "$TEMP_PACKAGE" == *.tar.gz ]]; then
            tar -xzf "$TEMP_PACKAGE" -C "assets/resource/"
          fi

          rm -f "$TEMP_PACKAGE"
          echo "Resources synced successfully (incremental mode)"

      - name: Download MAH-UI
        if: matrix.os != 'android'
        id: download_mfa
        uses: robinraju/release-downloader@v1
        with:
          repository: Quartewe/MAH-UI
          fileName: "MFW-PyQt6-${{ matrix.os }}-${{ matrix.arch }}-*"
          latest: true
          out-file-path: "MFA"
          extract: true

      - name: Clean up MAH-UI archive
        if: matrix.os != 'android'
        shell: bash
        run: |
          ARCHIVE_FILE_PATH="${{ fromJson(steps.download_mfa.outputs.downloaded_files)[0] }}"
          rm -f "${ARCHIVE_FILE_PATH}"
          echo "Archive cleanup command executed for MAH-UI."

      - name: Remove built-in runtime in MFA
        if: matrix.os != 'android'
        shell: bash
        run: |
          rm -rf MFA/runtimes
      
      - name: Install
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" != "android" ]]; then
            if [ -d "MFA" ]; then
              echo "Copying MFA files to install directory..."
              mkdir -p install
              rsync -av --ignore-existing MFA/ install/
              echo "MFA files copied successfully."
            else
              echo "MFA directory not found, skipping copy."
            fi
          else
            echo "Skipping copy MFA for Android."
          fi

          cd tools/
          python -m pip install -r ./requirements.txt
          python ./install.py ${{ needs.meta.outputs.tag }} ${{ matrix.os }} ${{ matrix.arch }}
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: MaaXXX-${{ matrix.os }}-${{ matrix.arch }}
          path: "install"
          retention-days: 1

  changelog:
    name: Generate changelog
    needs: meta
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: .github/cliff.toml
          # 正式版：使用 tag-pattern 只匹配正式版标签，包含所有从上一个正式版以来的提交
          # 预发布版：正常生成，只包含从上一个标签以来的提交
          args: >-
            -vv --latest --strip header
            ${{ needs.meta.outputs.is_prerelease == 'false' && '--tag-pattern "^v[0-9]+\\.[0-9]+\\.[0-9]+$"' || '' }}
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, install, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd $f && zip -r ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done
          
      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}

        # Mirror酱为第三方分发服务，新项目默认关闭
        # 若有需要请联系 Mirror酱 开通，直接自行开启是无法使用的
        # https://mirrorchyan.com/
      - name: Trigger MirrorChyanUploading
        if: false
        # if: ${{ github.repository_owner == 'MaaXYZ' }}
        shell: bash
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release.yml -f tag=${{ needs.meta.outputs.tag }}
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note.yml -f tag=${{ needs.meta.outputs.tag }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
